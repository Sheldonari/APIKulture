# nginx virtual host configuration for apikulture.com
#
# Deploy to /etc/nginx/sites-available/apikulture.com, then:
#   ln -s /etc/nginx/sites-available/apikulture.com /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Assumes SSL certificates are already provisioned, e.g. via:
#   certbot --nginx -d apikulture.com -d www.apikulture.com

# Redirect plain HTTP on both domains to HTTPS www.
server {
    listen 80;
    listen [::]:80;
    server_name apikulture.com www.apikulture.com;
    return 301 https://www.apikulture.com$request_uri;
}

# Redirect HTTPS apex to HTTPS www — this is the canonical redirect that
# allows Google and Bing to index the site. Without it both apex and www
# return 200 for identical content, which prevents either from being indexed.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name apikulture.com;

    ssl_certificate     /etc/letsencrypt/live/apikulture.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apikulture.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.apikulture.com$request_uri;
}

# Canonical HTTPS www — serves the static site.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.apikulture.com;

    ssl_certificate     /etc/letsencrypt/live/apikulture.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apikulture.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/apikulture.com;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets aggressively; HTML and sitemap/robots stay fresh.
    location ~* \.(css|svg|png|jpg|webp|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(html|xml|txt)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}
